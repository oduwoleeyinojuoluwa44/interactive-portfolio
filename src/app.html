<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1a1a1f" />
		<meta
			name="description"
			content="TEO — Full Stack Developer building robust, scalable web applications."
		/>
		<meta property="og:title" content="TEO · Full Stack Developer" />
		<meta
			property="og:description"
			content="Interactive developer portfolio built with SvelteKit."
		/>
		<meta property="og:type" content="website" />
		<!-- Absolute path so it resolves correctly on every route. SvelteKit's
		     %sveltekit.assets% expands to a relative path by default (paths.relative
		     = true), which 404s for nested routes like /work/[slug]. -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script>
			// Resolve theme + motion preference before paint (FOUC prevention) and
			// mark JS-enabled so `.js .to-reveal` reveal-on-scroll styles activate.
			// Without JS, content stays fully visible — progressive enhancement.
			(function () {
				document.documentElement.classList.add('js');
				try {
					var theme =
						localStorage.getItem('theme') === 'light' || localStorage.getItem('theme') === 'dark'
							? localStorage.getItem('theme')
							: window.matchMedia('(prefers-color-scheme: light)').matches
								? 'light'
								: 'dark';
					document.documentElement.setAttribute('data-theme', theme);

					var motion = localStorage.getItem('motion-pref');
					if (motion === 'reduce' || motion === 'allow') {
						document.documentElement.dataset.motion = motion;
					}
				} catch (e) {
					/* localStorage blocked — keep server-rendered default */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="hover" class="noise">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
